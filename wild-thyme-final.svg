<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&amp;family=Inter:wght@400;600&amp;display=swap');
      .serif-title { font-family: 'Cinzel', Georgia, serif; font-weight: 700; letter-spacing: 0.18em; fill: #FF5722; }
      .serif-bold { font-family: 'Cinzel', Georgia, serif; font-weight: 700; letter-spacing: 0.14em; fill: #FF5722; }
      .sans-small { font-family: 'Inter', system-ui, sans-serif; font-weight: 400; letter-spacing: 0.08em; fill: #2a2a2a; }
    </style>
  </defs>

  <!-- "WILD" Text - Top Center -->
  <text x="600" y="140" font-size="72" text-anchor="middle" class="serif-title">
    WILD
  </text>

  <!-- CENTRAL MONOGRAM SECTION -->
  <g id="central-monogram">
    <!-- Left Decorative Diamond -->
    <polygon points="420,270 445,295 420,320 395,295" fill="#6B8E7D" opacity="0.4"/>
    
    <!-- Main "C" Letter in Dark Charcoal -->
    <path d="M 540 210 Q 575 210 595 235 Q 610 255 610 295 Q 610 355 595 385 Q 575 410 540 410 Q 505 410 485 385" 
          fill="none" stroke="#2a2a2a" stroke-width="35" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Floral Sprig woven through C -->
    <path d="M 560 240 Q 555 280 560 320 Q 565 360 575 390" fill="none" stroke="#6B8E7D" stroke-width="2" opacity="0.8"/>
    
    <g transform="translate(525, 265)">
      <circle cx="0" cy="0" r="3" fill="#6B8E7D"/>
      <circle cx="-2" cy="-2" r="1.2" fill="#8BA89B"/>
      <circle cx="2" cy="-2" r="1.2" fill="#8BA89B"/>
      <circle cx="-2" cy="2" r="1.2" fill="#8BA89B"/>
      <circle cx="2" cy="2" r="1.2" fill="#8BA89B"/>
    </g>
    
    <g transform="translate(540, 295)">
      <circle cx="0" cy="0" r="2.8" fill="#5A7A8F"/>
      <circle cx="-1.5" cy="-1.5" r="1" fill="#C5D4E3"/>
      <circle cx="1.5" cy="-1.5" r="1" fill="#C5D4E3"/>
      <circle cx="-1.5" cy="1.5" r="1" fill="#C5D4E3"/>
      <circle cx="1.5" cy="1.5" r="1" fill="#C5D4E3"/>
      <circle cx="0" cy="0" r="0.7" fill="#FFFFFF"/>
    </g>
    
    <g transform="translate(565, 330)">
      <circle cx="0" cy="0" r="2.5" fill="#E8D4A2"/>
      <circle cx="-1.3" cy="-1.3" r="0.9" fill="#FFFFFF"/>
      <circle cx="1.3" cy="-1.3" r="0.9" fill="#FFFFFF"/>
      <circle cx="-1.3" cy="1.3" r="0.9" fill="#FFFFFF"/>
      <circle cx="1.3" cy="1.3" r="0.9" fill="#FFFFFF"/>
      <circle cx="0" cy="0" r="0.7" fill="#FFA500"/>
    </g>
    
    <g transform="translate(555, 365)">
      <circle cx="0" cy="0" r="2.8" fill="#6B8E7D"/>
      <circle cx="-1.5" cy="-1.5" r="1" fill="#8BA89B"/>
      <circle cx="1.5" cy="-1.5" r="1" fill="#8BA89B"/>
      <circle cx="-1.5" cy="1.5" r="1" fill="#8BA89B"/>
      <circle cx="1.5" cy="1.5" r="1" fill="#8BA89B"/>
    </g>
    
    <ellipse cx="535" cy="280" rx="2" ry="5" fill="#6B8E7D" opacity="0.6" transform="rotate(-25 535 280)"/>
    <ellipse cx="570" cy="310" rx="2" ry="5" fill="#8BA89B" opacity="0.5" transform="rotate(35 570 310)"/>
    <ellipse cx="545" cy="360" rx="2" ry="5" fill="#6B8E7D" opacity="0.6" transform="rotate(-15 545 360)"/>
    
    <polygon points="780,270 805,295 780,320 755,295" fill="#6B8E7D" opacity="0.4"/>
  </g>

  <g id="brand-text">
    <text x="360" y="535" font-size="100" text-anchor="end" class="serif-title">
      THYME
    </text>
    <text x="840" y="535" font-size="100" text-anchor="start" class="serif-title">
      GROUP
    </text>
  </g>

  <g id="emblem">
    <circle cx="600" cy="650" r="95" fill="none" stroke="#2a2a2a" stroke-width="3"/>
    <path d="M 600 560 A 90 90 0 0 1 665 595" fill="none" stroke="#6B8E7D" stroke-width="2.5" opacity="0.7"/>
    <polygon points="620,572 648,593 635,608" fill="#8BA89B" opacity="0.5"/>
    <path d="M 665 705 A 90 90 0 0 1 600 735" fill="none" stroke="#5A7A8F" stroke-width="2.5" opacity="0.7"/>
    <polygon points="648,715 656,745 630,735" fill="#7A98B4" opacity="0.5"/>
    <path d="M 535 705 A 90 90 0 0 1 600 735" fill="none" stroke="#E8D4A2" stroke-width="2.5" opacity="0.7"/>
    <polygon points="570,740 595,750 570,715" fill="#F5E5C0" opacity="0.5"/>
    <path d="M 535 595 A 90 90 0 0 1 600 560" fill="none" stroke="#6B8E7D" stroke-width="2.5" opacity="0.7"/>
    <polygon points="560,588 575,568 590,595" fill="#8BA89B" opacity="0.5"/>
    <g transform="translate(600, 650)">
      <line x1="0" y1="-32" x2="0" y2="32" stroke="#2a2a2a" stroke-width="1.5" opacity="0.35"/>
      <line x1="-32" y1="0" x2="32" y2="0" stroke="#2a2a2a" stroke-width="1.5" opacity="0.35"/>
      <line x1="-23" y1="-23" x2="23" y2="23" stroke="#2a2a2a" stroke-width="1.2" opacity="0.25"/>
      <line x1="23" y1="-23" x2="-23" y2="23" stroke="#2a2a2a" stroke-width="1.2" opacity="0.25"/>
      <circle cx="0" cy="0" r="10" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
    </g>
    <line x1="510" y1="650" x2="690" y2="650" stroke="#2a2a2a" stroke-width="3"/>
    <line x1="510" y1="670" x2="690" y2="670" stroke="#2a2a2a" stroke-width="3"/>
    <text x="600" y="666" font-size="28" text-anchor="middle" class="serif-bold">
      WILD THYME
    </text>
  </g>

  <text x="600" y="825" font-size="38" text-anchor="middle" class="sans-small">
    ESTD 2025
  </text>
  <circle cx="380" cy="830" r="2" fill="#6B8E7D" opacity="0.5"/>
  <circle cx="820" cy="830" r="2" fill="#6B8E7D" opacity="0.5"/>
</svg>