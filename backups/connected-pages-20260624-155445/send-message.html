<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | The Wild Thyme Group</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .touch-orange {
      transition: color 0.25s ease;
    }

    .touch-orange:hover {
      color: #ff4500;
    }

    .field-label {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
    }

    .dot-marker {
      width: 0.4rem;
      height: 0.4rem;
      border-radius: 9999px;
      background: rgba(148, 163, 184, 0.55);
      transition: background-color 0.25s ease, box-shadow 0.25s ease;
      display: inline-block;
    }

    .field-label:hover .dot-marker,
    .dot-with-text:hover .dot-marker {
      background: #00ff66;
      box-shadow: 0 0 0.45rem rgba(0, 255, 102, 0.5);
    }
  </style>
</head>
<body class="bg-[#141414] text-slate-100 min-h-screen">
  <main class="max-w-4xl mx-auto px-6 py-14 md:py-20">
    <a href="index2.html" class="touch-orange inline-flex items-center gap-2 text-xs uppercase tracking-[0.2em] text-orange-400 hover:text-orange-300 transition-colors">
      Back to Front Page
    </a>

    <section class="mt-8 bg-[#141414] p-8 md:p-12">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-10 md:gap-14 items-stretch">
      <div class="p-2 md:p-4 md:min-h-[640px] flex items-stretch">
        <div class="w-full h-full flex items-center justify-center">
          <img
            src="images/WT Group logo 3 D charcoal.png"
            alt="The Wild Thyme Group Logo"
            class="w-[24rem] h-[24rem] md:w-full md:h-full object-contain"
          >
        </div>
      </div>

      <div class="p-2 md:p-4 md:min-h-[640px]">
        <h1 class="touch-orange text-3xl md:text-4xl font-light uppercase tracking-[0.08em]">Contact Us</h1>

        <form id="contact-us-form" class="mt-10 space-y-5" action="https://formsubmit.co/marwan@thewildthymegroup.com" method="POST">
          <input type="hidden" name="_subject" value="New Contact Us Form Submission">
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_template" value="table">
          <input id="form-next-url" type="hidden" name="_next" value="">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label for="full-name" class="field-label touch-orange text-[11px] uppercase tracking-[0.15em] text-slate-300 mb-2"><span class="dot-marker" aria-hidden="true"></span>Full Name *</label>
              <input id="full-name" name="name" type="text" required class="w-full bg-[#11161d] border border-white/15 px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-orange-400" placeholder="Your name">
            </div>
            <div>
              <label for="email" class="field-label touch-orange text-[11px] uppercase tracking-[0.15em] text-slate-300 mb-2"><span class="dot-marker" aria-hidden="true"></span>Email Address *</label>
              <input id="email" name="email" type="email" required class="w-full bg-[#11161d] border border-white/15 px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-orange-400" placeholder="you@example.com">
            </div>
          </div>

          <div>
            <label for="subject" class="field-label touch-orange text-[11px] uppercase tracking-[0.15em] text-slate-300 mb-2"><span class="dot-marker" aria-hidden="true"></span>Subject *</label>
            <input id="subject" name="subject" type="text" required class="w-full bg-[#11161d] border border-white/15 px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-orange-400" placeholder="Catering inquiry, press request, partnership...">
          </div>

          <div>
            <label for="message" class="field-label touch-orange text-[11px] uppercase tracking-[0.15em] text-slate-300 mb-2"><span class="dot-marker" aria-hidden="true"></span>Message *</label>
            <textarea id="message" name="message" rows="6" required class="w-full bg-[#11161d] border border-white/15 px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-orange-400 resize-none" placeholder="Write your message here..."></textarea>
          </div>

          <div class="flex items-center justify-between gap-4 pt-2">
            <span class="dot-with-text touch-orange inline-flex items-center gap-2 text-[10px] uppercase tracking-[0.15em] text-slate-400"><span class="dot-marker" aria-hidden="true"></span>* Required fields</span>
            <button type="submit" class="bg-transparent border-0 p-0 text-[#FF4500] text-xs uppercase tracking-[0.2em] font-semibold hover:text-[#00FF66] transition-colors duration-300 cursor-pointer">
              Submit
            </button>
          </div>
        </form>
      </div>
      </div>
    </section>
  </main>

  <script>
    const nextUrlInput = document.getElementById('form-next-url');
    if (nextUrlInput) {
      nextUrlInput.value = `${window.location.origin}/thank-you.html`;
    }
  </script>

</body>
</html>
